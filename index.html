<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- Защита от XSS -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
<!-- Защита от clickjacking -->
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta http-equiv="X-Frame-Options" content="DENY">
<!-- Защита от перехвата MIME-типов -->
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<!-- Остальная безопасность -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="referrer" content="no-referrer">
<meta name="format-detection" content="telephone=no">
<title>🔐 Шифровальщик</title>
<style>
  :root{
    --bg:#0e0e0e;
    --panel:#141414;
    --muted:#9aa3a8;
    --accent:#2ea043;
    --blue:#0366d6;
    --danger:#da3633;
    --border:#222;
    --radius:10px;
    --gap:12px;
    font-synthesis: none;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    background:var(--bg);
    color:#e6eef0;
    padding:16px;
    display:flex;
    align-items:flex-start;
    justify-content:center;
  }
  .wrap{
    width:100%;
    max-width:720px;
    display:flex;
    flex-direction:column;
    gap:var(--gap);
  }

  header{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 12px;
    border-radius:var(--radius);
    background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    border:1px solid rgba(255,255,255,0.02);
  }
  .logo{
    width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#1fb073);
    display:flex;align-items:center;justify-content:center;font-weight:700;color:#04140a;
    box-shadow:0 6px 18px rgba(46,160,67,0.08);
    font-size:18px;
  }
  .hdr-text{display:flex;flex-direction:column}
  .hdr-title{font-size:15px;font-weight:700;color:var(--accent)}
  .hdr-sub{font-size:12px;color:var(--muted);margin-top:2px}

  .panel{
    background:var(--panel);
    border-radius:var(--radius);
    padding:12px;
    border:1px solid var(--border);
    box-shadow:0 6px 18px rgba(0,0,0,0.45);
  }

  label.title{
    display:block;font-size:12px;color:var(--accent);font-weight:700;margin-bottom:8px;text-transform:uppercase;
  }

  input[type=password], textarea{
    width:100%;
    padding:10px 12px;
    border-radius:8px;
    border:1px solid #222;
    background:#0b0b0b;
    color:#eef6f3;
    font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", monospace;
    font-size:14px;
    resize:vertical;
  }
  input[type=password]:focus, textarea:focus{
    outline:none;border-color:var(--accent);box-shadow:0 4px 18px rgba(46,160,67,0.08);
  }
  textarea{min-height:110px}

  .row{display:flex;gap:10px;align-items:center}
  .row.right{justify-content:flex-end}
  button{
    border:0;padding:10px 14px;border-radius:8px;color:#fff;font-weight:700;cursor:pointer;font-size:13px;
    display:inline-flex;align-items:center;gap:8px;justify-content:center;
  }
  .btn-primary{background:linear-gradient(180deg,var(--accent),#1fb073);box-shadow:0 8px 18px rgba(46,160,67,0.12)}
  .btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.03);color:var(--muted)}
  .btn-blue{background:var(--blue)}
  .btn-danger{background:var(--danger)}

  .controls{
    margin-top:10px;display:flex;gap:6px;align-items:stretch;flex-wrap:wrap;
  }
  .controls button{
    flex:1;min-width:85px;padding:8px 8px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }

  .status{
    margin-top:10px;padding:8px;border-radius:8px;font-size:13px;text-align:center;display:none;
  }
  .status.show{display:block}
  .status.success{background:rgba(46,160,67,0.08);color:var(--accent);border:1px solid rgba(46,160,67,0.12)}
  .status.error{background:rgba(218,54,51,0.06);color:var(--danger);border:1px solid rgba(218,54,51,0.08)}

  .footer{
    display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);
    gap:12px;margin-top:6px;
  }

  @media (max-width:520px){
    .row{flex-direction:column}
    .row.right{align-items:stretch}
    header{padding:8px}
    .logo{width:40px;height:40px;font-size:16px}
    .controls button{
      flex:0 1 calc(50% - 3px);min-width:auto;padding:8px 6px;font-size:10px;
    }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">E2</div>
      <div class="hdr-text">
        <div class="hdr-title">🔐 Шифровальщик</div>
        <div class="hdr-sub">Локальное шифрование — копируйте или отправляйте в чат</div>
      </div>
    </header>

    <div class="panel">
      <label class="title" for="password">🔑 Пароль</label>
      <input id="password" type="password" placeholder="Введите пароль (минимум 8 символов)" aria-label="Пароль">
      <div class="footer">
        <div>Используется PBKDF2 + AES-GCM + HMAC</div>
        <div style="color:var(--muted);">Пароль не отправляется на сервер</div>
      </div>
    </div>

    <div class="panel">
      <label class="title" for="message">📝 Сообщение</label>
      <textarea id="message" placeholder="Введите текст для шифрования или вставьте шифротекст для расшифровки" aria-label="Сообщение"></textarea>

      <div class="controls">
        <button class="btn-primary" onclick="encrypt()" aria-label="Зашифровать">🔐 Зашифровать</button>
        <button class="btn-blue" onclick="decrypt()" aria-label="Расшифровать">🔓 Расшифровать</button>
        <button class="btn-ghost" onclick="pasteFromClipboard()" aria-label="Вставить">📋 Вставить</button>
        <button class="btn-ghost" id="btn-select" onclick="selectAllIos()" aria-label="Выделить всё">✳️ Выделить всё</button>
        <button class="btn-danger" onclick="clearAll()" aria-label="Очистить">🗑 Очистить</button>
      </div>

      <div id="status" class="status" role="status" aria-live="polite"></div>
    </div>
  </div>

<script>
'use strict';


function status(msg, type='') {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = `status show ${type}`;
  if (!msg) s.className = 'status';
}

async function derive(password, salt) {
  const enc = new TextEncoder();
  const mat = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits({name: 'PBKDF2', salt, iterations: 400000, hash: 'SHA-256'}, mat, 512);
  const bytes = new Uint8Array(bits);
  return {
    aes: await crypto.subtle.importKey('raw', bytes.slice(0, 32), 'AES-GCM', false, ['encrypt', 'decrypt']),
    hmac: await crypto.subtle.importKey('raw', bytes.slice(32, 64), {name: 'HMAC', hash: 'SHA-256'}, false, ['sign', 'verify'])
  };
}

function b64(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function ub64(str) { const bin = atob(str); const u8 = new Uint8Array(bin.length); for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i); return u8; }

function clearAll() {
  const msgEl = document.getElementById('message');
  const statusEl = document.getElementById('status');

  if (msgEl) msgEl.value = '';
  if (statusEl) statusEl.className = 'status';
}

async function pasteFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('message').value = text;
    status('📋 Текст вставлен из буфера', 'success');
  } catch (e) {
    status('❌ Не удалось прочитать буфер обмена', 'error');
  }
}

async function encrypt() {
  const text = document.getElementById('message').value.trim();
  const pwd = document.getElementById('password').value.trim();
  if (!text || !pwd) { status('Введите пароль и сообщение', 'error'); return; }
  try {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const {aes, hmac} = await derive(pwd, salt);
    const enc = new TextEncoder();
    const ct = await crypto.subtle.encrypt({name: 'AES-GCM', iv}, aes, enc.encode(text));
    const mac = await crypto.subtle.sign('HMAC', hmac, ct);
    const all = new Uint8Array(salt.length + iv.length + ct.byteLength + 32);
    all.set(salt, 0); all.set(iv, 16); all.set(new Uint8Array(ct), 28); all.set(new Uint8Array(mac), 28 + ct.byteLength);
    const out = b64(all.buffer);
    document.getElementById('message').value = out;
    // Автоматическое копирование
    navigator.clipboard.writeText(out).then(() => {
      status('✅ Зашифровано и скопировано в буфер!', 'success');
    }).catch(() => {
      status('✅ Зашифровано (скопируйте вручную)', 'success');
    });
  } catch (e) {
    status('Ошибка шифрования', 'error');
  }
}

async function decrypt() {
  const dataB64 = document.getElementById('message').value.trim();
  const pwd = document.getElementById('password').value.trim();
  if (!dataB64 || !pwd) { status('Введите пароль и шифротекст', 'error'); return; }
  try {
    const data = ub64(dataB64);
    const salt = data.slice(0, 16), iv = data.slice(16, 28), mac = data.slice(data.length - 32), ct = data.slice(28, data.length - 32);
    const {aes, hmac} = await derive(pwd, salt);
    const ok = await crypto.subtle.verify('HMAC', hmac, mac, ct);
    if (!ok) throw new Error('HMAC');
    const plain = await crypto.subtle.decrypt({name: 'AES-GCM', iv}, aes, ct);
    document.getElementById('message').value = new TextDecoder().decode(plain);
    status('✅ Расшифровано!', 'success');
  } catch (e) {
    status('❌ Неверный пароль или данные', 'error');
  }
}

// Функция для определения iOS-устройства
function isIOS() {
  return /iP(ad|hone|od)/.test(navigator.platform) || (navigator.userAgent.includes('Mac') && 'ontouchend' in document);
}

// Выделение всего текста в textarea (работает специально для iOS)
function selectAllIos() {
  const ta = document.getElementById('message');
  if (!ta) return;
  ta.focus();
  try {
    ta.setSelectionRange(0, ta.value.length);
  } catch (err) {
    // ignore
  }
  setTimeout(() => {
    try { ta.select(); } catch (e) { /* no-op */ }
  }, 50);
  status('Выделено всё', 'success');
}

// Автовставка из буфера при загрузке (если там base64)
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('btn-select');
  if (btn && !isIOS()) btn.style.display = 'none';

  if (navigator.clipboard) {
    navigator.clipboard.readText().then(text => {
      if (text && /^[A-Za-z0-9+/=]+$/.test(text.trim()) && text.trim().length > 20) {
        document.getElementById('message').value = text.trim();
        status('📥 Вставлен шифротекст из буфера', 'success');
      }
    }).catch(()=>{/* no-op */});
  }
});
</script>

</body>
</html>
